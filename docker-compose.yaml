services:
  code-server:
    container_name: code-server
    build: .
    restart: unless-stopped
    ports:
      # Caddy が同一ホストで動く場合は "127.0.0.1:8080:8080" に絞る（READMEを参照）
      - "8080:8080"
    environment:
      - TZ=Asia/Tokyo
    volumes:
      - ./data:/home/coder/project   # 作業ファイル（ホストから直接見える）
      - code-server-home:/home/coder # 拡張機能・シェル設定・git認証情報の永続化

volumes:
  code-server-home:
